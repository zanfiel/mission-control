services:
  chiasm:
    build: .
    container_name: chiasm
    restart: unless-stopped
    ports:
      - "127.0.0.1:4300:4300"
    volumes:
      - ./data:/app/data
    environment:
      - PORT=4300
      - HOST=0.0.0.0
      - DB_PATH=/app/data/chiasm.db
      # - CHIASM_API_KEY=
      # - CHIASM_AUTH=disabled
